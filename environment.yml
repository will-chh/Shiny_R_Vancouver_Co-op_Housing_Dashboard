name: 532-gp19
channels:
  - conda-forge

dependencies:
  - python=3.11
  - pip

  # R runtime
  - r-base=4.5

  # R packages used by app.R
  - r-shiny
  - r-bslib
  - r-dplyr
  - r-plotly
  - r-dt
  - r-jsonlite
  - r-ellmer
  - r-duckdb

  # optional: keep these only if you still want Python tooling in this env
  - pandas=2.0
  - numpy=1.24
  - matplotlib=3.7
  - jupyter=1.0

  - pip:
      - python-dotenv